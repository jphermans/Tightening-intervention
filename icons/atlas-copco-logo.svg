<?xml version="1.0" encoding="UTF-8"?>
<!--
  Atlas Copco brand wordmark — PLACEHOLDER.
  This is a generic white-on-transparent wordmark using the brand text only.
  To use the official Atlas Copco logo, replace this file with the
  authorised asset (SVG, PNG, or JPG) from Atlas Copco brand resources.
  The .header-logo CSS in index.html will size any asset correctly for
  both screen and print.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110" width="520" height="110">
  <!-- White wordmark — renders cleanly on the teal header background.
       Replace this entire file with the official Atlas Copco logo. -->
  <text x="260" y="68"
        text-anchor="middle"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="56"
        letter-spacing="1"
        fill="#ffffff">AtlasCopco</text>
</svg>